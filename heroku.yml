# heroku.yml — declarative deploy contract for the frontend.
#
# `build.config` keys are forwarded to Docker as `--build-arg` at build time,
# so Vite can inline the API URL into the JS bundle.
#
# IMPORTANT: replace the placeholder URL below with the *live* backend URL
# (output of `heroku create stromteilung-api-<slug>`) before the first
# `git push heroku main` of the frontend. The deploy script in DEPLOY.md
# rewrites it for you via `sed`.

build:
  docker:
    web: Dockerfile
  config:
    VITE_API_URL: https://REPLACE-WITH-API-APP-NAME.herokuapp.com/api/v1

run:
  web: nginx -g 'daemon off;'
